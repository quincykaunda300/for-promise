<!DOCTYPE html>
<html>
<head>
  <title>For Promise ❤️</title>
  <!-- Elegant cursive font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Great Vibes', cursive;
      text-align: center;
      background: linear-gradient(135deg, #fdf5f0, #ffe6f0); /* soft pastel gradient */
      overflow: hidden;
    }

    .fade-in {
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h1 {
      color: #b36b6b; /* dusty rose */
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #333;
      max-width: 450px;
      margin: 0 auto 30px;
    }

    .button-link {
      display: inline-block;
      padding: 18px 40px;
      font-size: 22px;
      background: #d4af7f; /* elegant gold */
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeIn 2s forwards 2s;
    }

    .button-link:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: heartbeat 0.6s ease-in-out;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1.05); }
      50% { transform: scale(1.1); }
    }

    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
      opacity: 0.7;
      color: gold;
    }

    @keyframes fall {
      0% { transform: translateY(-10px); opacity:1; }
      100% { transform: translateY(100vh); opacity:0; }
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #b36b6b;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="fade-in">
    <h1>Hi Promise ❤️</h1>
    <p>I’ve made something special just for you. Click the button below to open your secret letter!</p>
    <a href="secret.html" class="button-link">Open My Secret Letter ❤️</a>
  </div>

  <footer>From your dearest reader, Quincy Wambui Kaunda ❤️</footer>

  <script>
    // Floating hearts in background
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = Math.random() > 0.8 ? "💘" : "❤️";
      heart.style.left = Math.random() * 90 + "vw";
      heart.style.fontSize = (Math.random() * 25 + 15) + "px";
      heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 10000);
    }

    setInterval(createHeart, 600);
  </script>

</body>
</html>
