<!DOCTYPE html>
<html>
<head>
  <title>Your Secret Letter ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Great Vibes', cursive;
      text-align: center;
      background: linear-gradient(135deg, #fdf5f0, #ffe6f0);
      overflow: hidden;
      position: relative;
    }

    .container {
      max-width: 700px;
      padding: 50px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(212, 175, 127, 0.3);
      position: relative;
      z-index: 2;
      display: none;
      font-family: 'Great Vibes', cursive;
    }

    h1 {
      color: #b36b6b;
      font-size: 48px;
      margin-bottom: 25px;
    }

    #letter {
      font-size: 28px;        /* larger font */
      line-height: 1.8;       /* more spacing */
      white-space: pre-line;
      color: #5a2d3a;         /* dark for readability */
      position: relative;
      z-index: 2;
    }

    .cursor {
      display: inline-block;
      width: 4px;
      background: #b36b6b;
      margin-left: 5px;
      animation: blink 1s infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes blink {0%,100%{opacity:1;}50%{opacity:0;}}

    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      z-index: 1;
      opacity: 0.7;
      color: gold;
    }

    @keyframes fall {0%{transform:translateY(-10px);opacity:1;}100%{transform:translateY(100vh);opacity:0;}}

    #startBtn {
      font-size: 26px;            /* bigger button text */
      padding: 18px 36px;
      background: #d4af7f;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      z-index: 2;
      position: relative;
    }

    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: heartbeat 0.6s ease-in-out;
    }

    @keyframes heartbeat {0%,100%{transform:scale(1.05);}50%{transform:scale(1.1);}}

    footer {
      margin-top: 25px;
      font-size: 20px;
      color: #b36b6b;
      position: relative;
      z-index: 2;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: gold;
      border-radius: 50%;
      opacity: 0.8;
      z-index: 1;
      animation: sparkleMove linear infinite;
    }

    @keyframes sparkleMove {0%{transform:translateY(0) scale(0.5);opacity:0.8;}50%{transform:translateY(-10px) scale(1);opacity:1;}100%{transform:translateY(0) scale(0.5);opacity:0.8;}}
  </style>
</head>
<body>

  <button id="startBtn">Open Your Letter ❤️</button>

  <div class="container" id="letterContainer">
    <h1>For You, Promise ❤️</h1>
    <p id="letter"></p><span class="cursor"></span>
    <footer>From your dearest reader, Quincy Wambui Kaunda ❤️</footer>
  </div>

  <script>
    const message = `Promise,

If you're reading this, it means you discovered the hidden letter.

I wanted to make something just for you, a small token of how much you mean to me.

Your presence brightens every day, your kindness warms every moment, and your smile is a treasure I never want to lose.

This letter is my way of telling you that someone out there loves you more than words can capture.

Always remember, you are cherished beyond measure.

❤️`;

    let index = 0;
    const speed = 100;

    function typeLetter() {
      if(index < message.length) {
        document.getElementById("letter").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeLetter, speed);
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = Math.random() > 0.8 ? "💘" : "❤️";
      heart.style.left = Math.random() * 90 + "vw";
      heart.style.fontSize = (Math.random() * 25 + 15) + "px";
      heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 10000);
    }

    function createSparkle() {
      const sparkle = document.createElement("div");
      sparkle.classList.add("sparkle");
      sparkle.style.left = Math.random() * 700 + "px";
      sparkle.style.top = Math.random() * 500 + "px";
      sparkle.style.width = (Math.random()*4+2)+"px";
      sparkle.style.height = sparkle.style.width;
      sparkle.style.animationDuration = (Math.random()*2+1)+"s";
      document.getElementById("letterContainer").appendChild(sparkle);
      setTimeout(() => { sparkle.remove(); }, 5000);
    }

    let heartInterval;
    let sparkleInterval;

    document.getElementById("startBtn").addEventListener("click", () => {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("letterContainer").style.display = "block";
      typeLetter();
      heartInterval = setInterval(createHeart, 600);
      sparkleInterval = setInterval(createSparkle, 300);
    });
  </script>

</body>
</html>
